<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Viewer Test</title>

  <!-- IMPORTANT: reliable CDN -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    model-viewer {
      width: 100%;
      height: 90vh;
      background: #222;
    }
  </style>
</head>

<body>

<h2>AR Viewer Test</h2>

<model-viewer
  src="https://modelviewer.dev/shared-assets/models/Duck.glb"
  camera-controls
  auto-rotate
  ar
  ar-modes="webxr scene-viewer quick-look"
  shadow-intensity="1"
>
</model-viewer>

</body>
</html>
