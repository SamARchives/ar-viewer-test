<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Debug Test</title>

  <!-- model-viewer -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    model-viewer::part(default-ar-button) {
      width: 96px;
      height: 96px;
    }

    model-viewer::part(default-ar-button):before {
      font-size: 28px;
    }
  </style>
</head>

<body style="margin:0; font-family:Arial; background:#111; color:white;">

<model-viewer
  id="viewer"
  src="./BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
  camera-controls
  auto-rotate
  exposure="1"
  shadow-intensity="0.8"
  style="width:100%; height:80vh; background:#111;">
</model-viewer>

  <div style="text-align:center; padding:12px;">
  <button id="arBtn"
    style="
      font-size:18px;
      padding:14px 22px;
      background:#1a73e8;
      color:#fff;
      border:none;
      border-radius:10px;
      width:90%;
      max-width:320px;">
    View in AR
  </button>

  <p id="msg" style="font-size:14px; opacity:0.7;"></p>
</div>

  <script>
const btn = document.getElementById("arBtn");
const msg = document.getElementById("msg");
const viewer = document.getElementById("viewer");

// Android Scene Viewer intent (direct)
const modelURL = encodeURIComponent(
  "https://samarchives.github.io/ar-viewer/BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
);

const arIntent =
  `intent://arvr.google.com/scene-viewer/1.0?file=${modelURL}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;

function isAndroid() {
  return /android/i.test(navigator.userAgent);
}

btn.addEventListener("click", () => {

  if (!isAndroid()) {
    msg.textContent = "AR is currently available on Android devices only.";
    return;
  }

  msg.textContent = "Attempting to launch AR...";

  try {
    window.location.href = arIntent;

    // fallback message if AR fails immediately
    setTimeout(() => {
      msg.textContent = "AR not available on this device. Showing 3D view instead.";
      viewer.style.display = "block";
    }, 2000);

  } catch (e) {
    msg.textContent = "AR launch failed. Showing 3D view.";
  }
});
</script>
  
</body>
</html>
