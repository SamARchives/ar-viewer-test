<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Debug Test</title>

  <!-- model-viewer -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    model-viewer::part(default-ar-button) {
      width: 96px;
      height: 96px;
    }

    model-viewer::part(default-ar-button):before {
      font-size: 28px;
    }
  </style>
</head>

<body style="margin:0; font-family:Arial; background:#111; color:white;">

<div style="padding:12px; text-align:center;">
  <button id="arBtn"
    style="
      font-size:18px;
      padding:14px 22px;
      background:#1a73e8;
      color:white;
      border:none;
      border-radius:10px;
      width:90%;
      max-width:320px;
    ">
    View in AR
  </button>

  <p id="arStatus" style="font-size:14px; opacity:0.7; margin-top:8px;"></p>
</div>

<model-viewer
  id="viewer"
  src="./thurstan_1129.glb"
  camera-controls
  auto-rotate

  ar
  ar-modes="scene-viewer quick-look"
  ar-scale="auto"

  disable-zoom

  style="width:100%; height:85vh;">
</model-viewer>
  
<script>
  const mv = document.querySelector("#viewer");

  if (mv) {
    mv.addEventListener("load", () => {
      document.getElementById("status").innerText = "Model loaded successfully ✅";
    });

    mv.addEventListener("error", (e) => {
      document.getElementById("status").innerText = "Model failed to load ❌";
      console.log("Model error:", e);
    });
  }
</script>

</body>
</html>
