<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Archive Viewer</title>

  <!-- model-viewer -->
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- Spinner style -->
  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <div style="text-align:center; padding:16px 12px 8px;">
    <div style="font-size:26px; font-weight:bold;">
      3D Archive Viewer
    </div>
    <div style="font-size:16px; opacity:0.8;">
      Tap below to view in AR
    </div>
  </div>

  <!-- MODEL AREA -->
  <div style="
    width:100%;
    display:flex;
    justify-content:center;
    position:relative;
  ">

    <!-- LOADING SPINNER -->
    <div id="loading" style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      opacity:0.9;
    ">
      <div class="spinner"></div>
      <div style="font-size:16px;">Loading 3D model</div>
    </div>

    <!-- INTERACTION HINT -->
    <div id="hint" style="
      position:absolute;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      font-size:14px;
      opacity:0.7;
    ">
      Drag to rotate
    </div>

    <!-- MODEL -->
    <model-viewer
      id="viewer"
      src="./BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
      camera-controls
      auto-rotate
      exposure="1"
      shadow-intensity="0.8"
      style="
        width:100%;
        max-width:900px;
        height:60vh;
        background: radial-gradient(circle at center, #222 0%, #111 70%);
      ">
    </model-viewer>

  </div>

  <!-- BUTTON -->
  <div style="text-align:center; padding:12px 12px 20px;">
    <button id="arBtn"
      style="
        font-size:22px;
        padding:18px 24px;
        background:#1a73e8;
        color:#fff;
        border:none;
        border-radius:12px;
        width:90%;
        max-width:360px;">
      View in AR
    </button>

    <div style="font-size:15px; opacity:0.7; margin-top:10px;">
      AR availability depends on device support
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const viewer = document.getElementById("viewer");
    const loading = document.getElementById("loading");
    const hint = document.getElementById("hint");
    const btn = document.getElementById("arBtn");

    // Hide loading when model loads
    viewer.addEventListener("load", () => {
      loading.style.opacity = "0";
      setTimeout(() => loading.style.display = "none", 300);
    });

    // Hide hint after interaction
    viewer.addEventListener("camera-change", () => {
      hint.style.display = "none";
    });

    // AR launch
    const modelURL = encodeURIComponent(
      "https://samarchives.github.io/ar-viewer/src="./BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
    );

    const arIntent =
      `intent://arvr.google.com/scene-viewer/1.0?file=${modelURL}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;

    btn.addEventListener("click", () => {
      btn.innerText = "Opening AR...";
      btn.style.opacity = "0.7";
      window.location.href = arIntent;
    });
  </script>

</body>
</html>
