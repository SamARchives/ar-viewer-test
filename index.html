<!doctype html>
<html>
<head>
  <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>3D + AR Viewer</title>

  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrap {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      background: #111;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      padding: 16px 12px 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.8;
      padding: 0 12px 16px;
      text-align: center;
    }

    .btn {
      font-size: 22px;
      padding: 18px 24px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 12px;
      width: 90%;
      max-width: 360px;
      margin-top: 14px;
    }

    .note {
      font-size: 16px;
      opacity: 0.7;
      text-align: center;
      margin-top: 12px;
      padding: 0 16px;
      line-height: 1.4;
    }
  </style>
</head>

<body style="
  margin:0;
  background:#111;
  font-family:Arial, sans-serif;
  color:white;
  display:flex;
  flex-direction:column;
">

  <!-- TOP -->
  <div style="
    text-align:center;
    padding:16px 12px 8px;
  ">
    <div style="font-size:26px; font-weight:bold;">
      3D Archive Viewer
    </div>
    <div style="font-size:16px; opacity:0.8;">
      Tap below to view in AR
    </div>
  </div>

  <!-- MODEL -->
  <div style="
    width:100%;
    display:flex;
    justify-content:center;
  ">
    <model-viewer
      id="viewer"
      src="./BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
      camera-controls
      auto-rotate
      exposure="1"
      shadow-intensity="0.8"
      style="width:100%; max-width:900px; height:60vh; background:#111;">
    </model-viewer>
  </div>

  <!-- BUTTON -->
  <div style="
    text-align:center;
    padding:12px 12px 20px;
  ">
    <button id="arBtn"
      style="
        font-size:22px;
        padding:18px 24px;
        background:#1a73e8;
        color:#fff;
        border:none;
        border-radius:12px;
        width:90%;
        max-width:360px;">
      View in AR
    </button>

    <div style="font-size:15px; opacity:0.7; margin-top:10px;">
      AR availability depends on device support
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const btn = document.getElementById("arBtn");

    const modelURL = encodeURIComponent(
      "https://samarchives.github.io/ar-viewer/BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
    );

    const arIntent =
      `intent://arvr.google.com/scene-viewer/1.0?file=${modelURL}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;

    btn.addEventListener("click", () => {
      window.location.href = arIntent;
    });
  </script>

</body>
</html>
