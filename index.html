<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Archive Viewer</title>

  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <div style="text-align:center; padding:16px 12px 8px;">
    <div style="font-size:26px; font-weight:bold;">
      3D Archive Viewer
    </div>
    <div style="font-size:16px; opacity:0.8;">
      Tap below to view in AR
    </div>
  </div>

  <!-- MODEL -->
  <div style="
    width:100%;
    display:flex;
    justify-content:center;
    position:relative;
    background:#111;
  ">

    <!-- LOADER (always visible immediately) -->
    <div id="loading" style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      z-index:10;
    ">
      <div class="spinner"></div>
      <div style="font-size:14px;">Loading model</div>
    </div>

    <!-- MODEL -->
    <model-viewer
      id="viewer"
      src="./BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
      camera-controls
      touch-action="pan-y"
      camera-orbit="0deg 75deg auto"
      min-camera-orbit="auto auto 0.5m"
      max-camera-orbit="auto auto 5m"
      interaction-prompt="auto"
      style="
        width:100%;
        max-width:900px;
        height:55vh;
        background:#111;
      ">
    </model-viewer>

  </div>

  <!-- BUTTON -->
  <div style="text-align:center; padding:14px;">
    <button id="arBtn"
      style="
        font-size:22px;
        padding:18px;
        background:#1a73e8;
        color:white;
        border:none;
        border-radius:12px;
        width:90%;
        max-width:360px;">
      View in AR
    </button>

    <div style="font-size:14px; opacity:0.7; margin-top:10px;">
      AR depends on device support
    </div>
  </div>

  <script>
    const viewer = document.getElementById("viewer");
    const loading = document.getElementById("loading");
    const btn = document.getElementById("arBtn");

    // FORCE loader visible immediately
    loading.style.display = "flex";

    // Hide loader reliably
    viewer.addEventListener("load", () => {
      loading.style.display = "none";
    });

    // Backup: hide loader after 5s no matter what
    setTimeout(() => {
      loading.style.display = "none";
    }, 5000);

    // AR LINK (⚠️ REPLACE THIS URL)
    const modelURL = encodeURIComponent(
      "https://samarchives.github.io/ar-viewer-test/BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
    );

    const arIntent =
      `intent://arvr.google.com/scene-viewer/1.0?file=${modelURL}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;

    btn.addEventListener("click", () => {
      btn.innerText = "Opening AR...";
      window.location.href = arIntent;
    });
  </script>

</body>
</html>
