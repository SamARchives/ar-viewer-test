<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Debug Test</title>

  <!-- model-viewer -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="margin:0; font-family:Arial; background:#111; color:white;">

<h2>AR Debug Test</h2>

<p id="status">If you see this text but no model below, the issue is model-viewer or GLB loading.</p>

<model-viewer
  id="viewer"
 src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb"
  camera-controls
  auto-rotate
  style="width:100%; height:80vh; background:#222;"
></model-viewer>

<script>
  const mv = document.querySelector("#viewer");

  mv.addEventListener("load", () => {
    document.getElementById("status").innerText = "Model loaded successfully ✅";
  });

  mv.addEventListener("error", (e) => {
    document.getElementById("status").innerText = "Model failed to load ❌ (check network/CORS)";
    console.log("Model error:", e);
  });
</script>

</body>
</html>
