<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Debug Test</title>

  <!-- model-viewer -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    model-viewer::part(default-ar-button) {
      width: 96px;
      height: 96px;
    }

    model-viewer::part(default-ar-button):before {
      font-size: 28px;
    }
  </style>
</head>

<body style="margin:0; font-family:Arial; background:#111; color:white;">

<model-viewer
  id="viewer"
  src="./BCI-1_Grant_of_Thurstan_1129_re-sized.glb"

  camera-controls
  auto-rotate

  ar
  ar-modes="scene-viewer quick-look"
  ar-scale="auto"

  style="width:100%; height:80vh; background:#111;">
</model-viewer>
  
</body>
</html>
