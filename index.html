<!doctype html>
<html>
<head>
  <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>3D + AR Viewer</title>

  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrap {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      background: #111;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      padding: 16px 12px 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.8;
      padding: 0 12px 16px;
      text-align: center;
    }

    .btn {
      font-size: 22px;
      padding: 18px 24px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 12px;
      width: 90%;
      max-width: 360px;
      margin-top: 14px;
    }

    .note {
      font-size: 16px;
      opacity: 0.7;
      text-align: center;
      margin-top: 12px;
      padding: 0 16px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="title">3D Archive Viewer</div>
    <div class="subtitle">Tap below to view in AR (if supported)</div>

    <model-viewer
      id="viewer"
      src="./BCI-1_Grant_of_Thurstan_1129_re-sized.glb"
      camera-controls
      auto-rotate
      exposure="1"
      shadow-intensity="0.8">
    </model-viewer>

    <button class="btn" id="arBtn">
      View in AR
    </button>

    <div class="note">
      AR availability depends on your device.  
      If AR does not open, you can still explore the 3D model above.
    </div>

  </div>

 <script>
const btn = document.getElementById("arBtn");
const viewer = document.getElementById("viewer");

let modelReady = false;

// Wait for model to fully load
viewer.addEventListener("load", () => {
  modelReady = true;
  btn.style.opacity = "1";
  btn.textContent = "View in AR";
});

// disable AR until ready
btn.style.opacity = "0.4";
btn.textContent = "Loading model...";

const modelURL = encodeURIComponent(
  "https://yourusername.github.io/ar-viewer/thurstan_1129.glb"
);

const arIntent =
  `intent://arvr.google.com/scene-viewer/1.0?file=${modelURL}&mode=ar_only#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;

btn.addEventListener("click", () => {

  if (!modelReady) {
    alert("Please wait for model to load");
    return;
  }

  window.location.href = arIntent;
});
</script>

</body>
</html>
